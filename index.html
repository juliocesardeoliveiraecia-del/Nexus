<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus IPTV - Ipameri GO</title>  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #030712;
      color: white;
      overflow-x: hidden;
    }

    .bg-glow {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: -1;
      overflow: hidden;
    }

    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.25;
    }

    .blue {
      width: 500px;
      height: 500px;
      background: #2563eb;
      top: -100px;
      left: -100px;
    }

    .purple {
      width: 500px;
      height: 500px;
      background: #9333ea;
      bottom: -100px;
      right: -100px;
    }

    .orange {
      width: 400px;
      height: 400px;
      background: #f97316;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }

    .hero-image,
    .grid img,
    .banner img {
      width: 100%;
      border-radius: 25px;
      display: block;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    .hero-image {
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
    }

    .banner {
      margin-bottom: 40px;
    }

    .whatsapp {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      padding: 18px 24px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 0 25px rgba(34,197,94,0.5);
      animation: pulse 2s infinite;
      z-index: 999;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    .footer {
      text-align: center;
      padding: 30px 10px;
      color: #a1a1aa;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .whatsapp {
        left: 10px;
        right: 10px;
        bottom: 10px;
        text-align: center;
      }
    }
  </style></head>
<body>  <div class="bg-glow">
    <div class="glow blue"></div>
    <div class="glow purple"></div>
    <div class="glow orange"></div>
  </div>  <div class="container"><!-- IMAGEM PRINCIPAL -->
<img class="hero-image" src="nexus-main-promo.png" alt="Nexus IPTV" />

<!-- PROMOÇÕES -->
<div class="grid">
  <img src="nexus-vintao.png" alt="Promoção Vintão" />
  <img src="nexus-3meses.png" alt="Promoção 3 Meses" />
</div>

<!-- BANNER CONTEÚDOS -->
<div class="banner">
  <img src="nexus-conteudos.png" alt="+15 Mil Conteúdos" />
</div>

  </div>  <!-- BOTÃO WHATSAPP -->  <a class="whatsapp" href="https://wa.me/5564996039433" target="_blank">
    CHAMAR NO WHATSAPP
  </a>  <div class="footer">
    Nexus IPTV • Ipameri-GO • Mais que TV. É liberdade.
  </div></body>
</html>
